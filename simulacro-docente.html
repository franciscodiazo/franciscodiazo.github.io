<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenamiento Concurso Docente 2026 · Francisco Díaz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-teacher: #8B5CF6; /* Púrpura pedagógico */
            --bg-card: #1E293B;
            --success: #10B981;
            --error: #EF4444;
        }

        body {
            background-color: #0F172A;
            color: #F1F5F9;
        }

        .training-container {
            max-width: 900px;
            margin: 100px auto;
            padding: 0 20px;
        }

        .stats-bar {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 80px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .progress-circle {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .score-display {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-teacher);
        }

        .question-wrapper {
            animation: slideUp 0.5s ease-out;
        }

        .teacher-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 2.5rem;
            border-left: 6px solid var(--accent-teacher);
            margin-bottom: 2rem;
        }

        .category-tag {
            background: rgba(139, 92, 246, 0.2);
            color: #C4B5FD;
            padding: 0.4rem 1rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .option-item {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1.2rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .option-item:hover {
            border-color: var(--accent-teacher);
            background: rgba(139, 92, 246, 0.05);
        }

        .option-item.selected {
            background: var(--accent-teacher);
            border-color: var(--accent-teacher);
        }

        .feedback-panel {
            display: none;
            margin-top: 2rem;
            animation: fadeIn 0.5s ease;
        }

        .feedback-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        @media (max-width: 768px) {
            .feedback-grid { grid-template-columns: 1fr; }
        }

        .fb-box {
            background: rgba(15, 23, 42, 0.8);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .fb-box h5 {
            color: var(--accent-teacher);
            margin-bottom: 0.8rem;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .btn-next {
            background: var(--accent-teacher);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 2rem;
        }

        .doc-link {
            display: block;
            color: #38BDF8;
            text-decoration: none;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .doc-link:hover { text-decoration: underline; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">Francisco<span>Díaz</span></a>
            <nav class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="simulacro-icfes.html">Simulacro ICFES</a>
                <a href="simulacro-docente.html" class="active">Concurso Docente</a>
            </nav>
        </div>
    </header>

    <div class="training-container">
        <div class="stats-bar">
            <div class="progress-circle">
                <i class="fas fa-graduation-cap fa-2x" style="color: var(--accent-teacher);"></i>
                <div>
                    <p style="font-size: 0.75rem; color: #94A3B8;">Progreso del Entrenamiento</p>
                    <div class="score-display"><span id="current-score">0</span> / <span id="total-questions">0</span></div>
                </div>
            </div>
            <div id="status-text" style="font-weight: 600; color: #94A3B8;">Selecciona una opción</div>
        </div>

        <div id="question-container" class="question-wrapper">
            <!-- Cargando dinámicamente -->
        </div>

        <div id="feedback-panel" class="feedback-panel">
            <div id="result-banner" style="padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; font-weight: 800; text-align: center;">
                <!-- Éxito o Error -->
            </div>

            <div class="feedback-grid">
                <div class="fb-box">
                    <h5><i class="fas fa-microchip"></i> Retroalimentación Técnica</h5>
                    <p id="fb-tecnica" style="font-size: 0.9rem; line-height: 1.6;"></p>
                </div>
                <div class="fb-box">
                    <h5><i class="fas fa-brain"></i> Análisis Pedagógico</h5>
                    <p id="fb-pedagogica" style="font-size: 0.9rem; line-height: 1.6;"></p>
                </div>
                <div class="fb-box">
                    <h5><i class="fas fa-list-ol"></i> Pasos de Resolución</h5>
                    <ul id="fb-pasos" style="font-size: 0.9rem; color: #94A3B8; padding-left: 1rem;"></ul>
                </div>
                <div class="fb-box">
                    <h5><i class="fas fa-file-contract"></i> Normatividad / Documentos</h5>
                    <div id="fb-docs"></div>
                </div>
            </div>

            <button id="btn-next" class="btn-next">Siguiente Pregunta <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        let questions = [];
        let currentIndex = 0;
        let score = 0;

        async function init() {
            try {
                const response = await fetch('preguntas-docente.json');
                questions = await response.json();
                document.getElementById('total-questions').innerText = questions.length;
                renderQuestion();
            } catch (error) {
                console.error('Error al cargar preguntas:', error);
            }
        }

        function renderQuestion() {
            const q = questions[currentIndex];
            const container = document.getElementById('question-container');
            const feedback = document.getElementById('feedback-panel');
            
            feedback.style.display = 'none';
            container.innerHTML = `
                <div class="teacher-card">
                    <span class="category-tag">${q.categoria}</span>
                    <h2 style="font-family:'Outfit'; margin-bottom: 2rem; line-height: 1.4;">${q.pregunta}</h2>
                    <div class="options-list">
                        ${Object.entries(q.opciones).map(([key, value]) => `
                            <div class="option-item" onclick="checkAnswer('${key}')" id="opt-${key}">
                                <div style="width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-weight:800;">${key}</div>
                                <span>${value}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('status-text').innerText = "Pregunta " + (currentIndex + 1) + " de " + questions.length;
        }

        function checkAnswer(selected) {
            const q = questions[currentIndex];
            const feedback = document.getElementById('feedback-panel');
            const banner = document.getElementById('result-banner');
            
            // Deshabilitar opciones
            const options = document.querySelectorAll('.option-item');
            options.forEach(opt => opt.style.pointerEvents = 'none');

            const isCorrect = selected === q.correcta;
            
            if (isCorrect) {
                score++;
                document.getElementById('current-score').innerText = score;
                banner.style.background = "rgba(16, 185, 129, 0.2)";
                banner.style.color = "#10B981";
                banner.innerHTML = "<i class='fas fa-check-circle'></i> ¡ACIERTO TÉCNICO! +1 Punto";
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } else {
                banner.style.background = "rgba(239, 68, 68, 0.2)";
                banner.style.color = "#EF4444";
                banner.innerHTML = "<i class='fas fa-times-circle'></i> RESPUESTA INCORRECTA - Analiza la retroalimentación";
                document.getElementById(`opt-${selected}`).style.borderColor = "var(--error)";
            }

            document.getElementById(`opt-${q.correcta}`).style.borderColor = "var(--success)";
            document.getElementById(`opt-${q.correcta}`).style.background = "rgba(16, 185, 129, 0.1)";

            // Llenar Retroalimentación
            document.getElementById('fb-tecnica').innerText = q.explicacion.tecnica;
            document.getElementById('fb-pedagogica').innerText = q.explicacion.pedagogica;
            
            const pasosList = document.getElementById('fb-pasos');
            pasosList.innerHTML = q.explicacion.pasos.map(p => `<li style="margin-bottom:0.5rem;">${p}</li>`).join('');
            
            const docsDiv = document.getElementById('fb-docs');
            docsDiv.innerHTML = q.explicacion.documentos.map(d => `
                <a href="#" class="doc-link"><i class="fas fa-file-pdf"></i> ${d}</a>
            `).join('');

            feedback.style.display = 'block';
            
            // Scroll suave a la retroalimentación
            feedback.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        document.getElementById('btn-next').addEventListener('click', () => {
            currentIndex++;
            if (currentIndex < questions.length) {
                renderQuestion();
            } else {
                showFinalResults();
            }
        });

        function showFinalResults() {
            const container = document.getElementById('question-container');
            const feedback = document.getElementById('feedback-panel');
            feedback.style.display = 'none';
            
            container.innerHTML = `
                <div class="teacher-card" style="text-align:center;">
                    <i class="fas fa-trophy fa-4x" style="color:#F59E0B; margin-bottom:1.5rem;"></i>
                    <h2 style="font-size:2.5rem; margin-bottom:1rem;">¡Entrenamiento Completado!</h2>
                    <p style="font-size:1.2rem; color:#94A3B8; margin-bottom:2rem;">Has logrado un puntaje de ${score} sobre ${questions.length}.</p>
                    <button onclick="location.reload()" class="btn-next">Reiniciar Entrenamiento</button>
                    <a href="index.html" style="display:block; margin-top:1rem; color:var(--accent-teacher);">Volver al inicio</a>
                </div>
            `;
        }

        init();
    </script>
</body>
</html>
