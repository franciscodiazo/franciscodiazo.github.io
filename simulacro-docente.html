<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenamiento Concurso Docente · Francisco Díaz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #7C3AED;
            --purple-light: #A78BFA;
            --purple-bg: #4C1D95;
            --dark: #0F172A;
            --card: #1E293B;
            --border: rgba(255,255,255,0.08);
            --green: #10B981;
            --red: #EF4444;
            --amber: #F59E0B;
            --text: #F1F5F9;
            --muted: #94A3B8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; }

        /* ── Stats Bar ── */
        .stats-bar {
            position: sticky; top: 72px; z-index: 50;
            background: rgba(30,41,59,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex; align-items: center; justify-content: space-between; gap: 1rem;
        }
        .score-pill {
            background: var(--purple-bg); color: #fff;
            padding: 0.4rem 1.2rem; border-radius: 999px;
            font-weight: 800; font-size: 1.1rem;
        }
        .progress-bar-wrap {
            flex: 1; max-width: 300px;
            background: rgba(255,255,255,0.1); border-radius: 999px; height: 8px; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; background: linear-gradient(90deg, var(--purple), var(--purple-light));
            border-radius: 999px; transition: width 0.5s ease;
        }
        .progress-label { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }

        /* ── Container ── */
        .wrap { max-width: 880px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

        /* ── Question Card ── */
        .q-card {
            background: var(--card); border-radius: 20px;
            border-left: 5px solid var(--purple);
            padding: 2.5rem; margin-bottom: 1.5rem;
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

        .q-meta { display: flex; gap: 0.7rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .tag {
            padding: 0.3rem 0.9rem; border-radius: 999px; font-size: 0.72rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .tag-mod { background: rgba(124,58,237,0.25); color: var(--purple-light); }
        .tag-cat { background: rgba(245,158,11,0.15); color: var(--amber); }
        .q-text { font-size: 1.05rem; line-height: 1.7; }

        /* ── Options ── */
        .options { margin-top: 2rem; display: flex; flex-direction: column; gap: 0.9rem; }
        .opt {
            background: rgba(15,23,42,0.6); border: 1.5px solid var(--border);
            border-radius: 12px; padding: 1.1rem 1.4rem;
            display: flex; align-items: flex-start; gap: 1rem;
            cursor: pointer; transition: border-color 0.2s, background 0.2s;
        }
        .opt:hover:not(.disabled) { border-color: var(--purple-light); background: rgba(124,58,237,0.08); }
        .opt.disabled { cursor: default; }
        .opt.correct { border-color: var(--green) !important; background: rgba(16,185,129,0.1) !important; }
        .opt.wrong   { border-color: var(--red)   !important; background: rgba(239,68,68,0.1)   !important; }
        .opt.neutral { border-color: rgba(255,255,255,0.15) !important; opacity: 0.6; }
        .opt-key {
            width: 32px; height: 32px; min-width: 32px; border-radius: 50%;
            background: rgba(255,255,255,0.08); display: flex; align-items: center;
            justify-content: center; font-weight: 800; font-size: 0.9rem;
        }
        .opt.correct .opt-key { background: var(--green); color: #fff; }
        .opt.wrong   .opt-key { background: var(--red);   color: #fff; }

        /* ── Inline per-option feedback ── */
        .opt-fb {
            display: none; margin-top: 0.8rem; padding: 0.9rem 1rem;
            border-radius: 8px; font-size: 0.85rem; line-height: 1.6;
        }
        .opt.correct .opt-fb { display: block; background: rgba(16,185,129,0.15); color: #D1FAE5; }
        .opt.wrong   .opt-fb { display: block; background: rgba(239,68,68,0.12);   color: #FCA5A5; }
        .opt-fb ul { padding-left: 1.2rem; margin-top: 0.4rem; }
        .opt-fb li { margin-bottom: 0.3rem; }
        .opt-fb .fix { margin-top: 0.5rem; color: #FDE68A; font-style: italic; }

        /* ── Main Feedback Panel ── */
        .fb-panel {
            display: none; background: var(--card); border-radius: 20px;
            padding: 2rem; margin-bottom: 1.5rem; animation: slideUp 0.4s ease;
        }
        .fb-banner {
            padding: 1.2rem 1.5rem; border-radius: 12px; margin-bottom: 1.5rem;
            text-align: center; font-weight: 800; font-size: 1.1rem;
        }
        .fb-banner.ok  { background: rgba(16,185,129,0.2); color: var(--green); }
        .fb-banner.err { background: rgba(239,68,68,0.2);   color: var(--red);   }

        .fb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
        @media(max-width:680px){ .fb-grid { grid-template-columns: 1fr; } }

        .fb-box {
            background: rgba(15,23,42,0.7); border: 1px solid var(--border);
            border-radius: 12px; padding: 1.3rem;
        }
        .fb-box h5 {
            font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--purple-light); margin-bottom: 0.8rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .fb-box p, .fb-box li { font-size: 0.88rem; line-height: 1.6; color: #CBD5E1; }
        .fb-box ul, .fb-box ol { padding-left: 1.2rem; }
        .fb-box li { margin-bottom: 0.35rem; }
        .fb-box .conclusion {
            margin-top: 0.8rem; padding: 0.7rem 1rem;
            background: rgba(124,58,237,0.2); border-radius: 8px;
            color: #DDD6FE; font-style: italic; font-size: 0.85rem;
        }

        /* ── Método (pasos) – Purple block ── */
        .method-block {
            background: var(--purple-bg); border-radius: 12px; padding: 1.5rem;
            margin-top: 0.5rem;
        }
        .method-block h5 {
            color: #fff; font-size: 0.85rem; font-weight: 800;
            margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .method-block h5 i { color: #FDE047; }
        .method-block ol { color: #EDE9FE; padding-left: 1.2rem; font-size: 0.88rem; }
        .method-block li { margin-bottom: 0.4rem; }

        /* ── Normativas ── */
        .norm-item {
            border-left: 3px solid var(--purple-light);
            padding: 0.6rem 0.8rem; margin-bottom: 0.7rem;
            background: rgba(124,58,237,0.08); border-radius: 0 8px 8px 0;
        }
        .norm-item strong { font-size: 0.85rem; color: var(--purple-light); }
        .norm-item p { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }

        /* ── Claves generales ── */
        .claves-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .clave-item {
            display: flex; align-items: flex-start; gap: 0.6rem;
            font-size: 0.87rem; color: #CBD5E1;
        }
        .clave-item i { color: var(--amber); margin-top: 2px; }

        /* ── Buttons ── */
        .btn-next {
            width: 100%; padding: 1.1rem; border: none; border-radius: 12px;
            background: linear-gradient(135deg, var(--purple), #5B21B6);
            color: #fff; font-size: 1rem; font-weight: 700;
            cursor: pointer; margin-top: 1.5rem; transition: opacity 0.2s;
        }
        .btn-next:hover { opacity: 0.9; }

        /* ── Final Screen ── */
        .final-card {
            background: var(--card); border-radius: 20px; padding: 3rem 2rem;
            text-align: center; animation: slideUp 0.4s ease;
        }
        .final-card h2 { font-family: 'Outfit', sans-serif; font-size: 2.2rem; margin: 1rem 0; }
        .score-big { font-size: 4rem; font-weight: 900; color: var(--purple-light); }
        .result-msg { color: var(--muted); font-size: 1.1rem; margin-bottom: 2rem; }
        .btn-restart {
            display: inline-block; padding: 1rem 2.5rem; border-radius: 12px;
            background: var(--purple-bg); color: #fff;
            font-weight: 700; cursor: pointer; border: none; font-size: 1rem;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <span class="logo-text">ingfrancisco</span><span class="logo-accent">diaz</span><span class="logo-dot">.</span>
            </a>
            <nav class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="simulacro-icfes.html">Simulacro ICFES</a>
                <a href="simulacro-docente.html" class="active">Concurso Docente</a>
            </nav>
        </div>
    </header>

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div style="display:flex;align-items:center;gap:0.8rem;">
            <i class="fas fa-graduation-cap" style="color:var(--purple-light);font-size:1.3rem;"></i>
            <span class="score-pill">
                <span id="score">0</span> / <span id="total">0</span> pts
            </span>
        </div>
        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <span class="progress-label" id="progress-label">Pregunta 1</span>
    </div>

    <div class="wrap">
        <div id="question-zone"></div>
        <div id="fb-panel" class="fb-panel"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
    let questions = [], cur = 0, score = 0;

    async function init() {
        const r = await fetch('preguntas-docente.json');
        questions = await r.json();
        document.getElementById('total').textContent = questions.length;
        render();
    }

    function render() {
        const q = questions[cur];
        document.getElementById('fb-panel').style.display = 'none';
        document.getElementById('fb-panel').innerHTML = '';
        document.getElementById('progress-label').textContent = `Pregunta ${cur + 1} de ${questions.length}`;
        document.getElementById('progress-fill').style.width = (cur / questions.length * 100) + '%';

        document.getElementById('question-zone').innerHTML = `
            <div class="q-card">
                <div class="q-meta">
                    <span class="tag tag-mod"><i class="fas fa-layer-group"></i> ${q.modulo}</span>
                    <span class="tag tag-cat">${q.categoria}</span>
                </div>
                <p class="q-text">${q.enunciado}</p>
                <div class="options" id="opts">
                    ${q.opciones.map(op => `
                        <div class="opt" id="opt-${op.id}" onclick="check('${op.id}')">
                            <div class="opt-key">${op.id}</div>
                            <div style="flex:1;">
                                <div>${op.texto}</div>
                                <div class="opt-fb" id="ofb-${op.id}"></div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>`;
    }

    function check(sel) {
        const q = questions[cur];
        // Disable all options
        document.querySelectorAll('.opt').forEach(el => {
            el.classList.add('disabled');
            el.onclick = null;
        });

        const isCorrect = sel === q.respuesta_correcta;
        if (isCorrect) { score++; document.getElementById('score').textContent = score; }

        // Style & per-option feedback
        q.opciones.forEach(op => {
            const el = document.getElementById('opt-' + op.id);
            const fb = document.getElementById('ofb-' + op.id);
            if (op.id === q.respuesta_correcta) {
                el.classList.add('correct');
            } else if (op.id === sel && !op.es_correcta) {
                el.classList.add('wrong');
            } else {
                el.classList.add('neutral');
            }
            // Build per-option feedback HTML
            const r = op.retroalimentacion;
            if (op.id === sel || op.id === q.respuesta_correcta) {
                let html = `<p><strong>Análisis:</strong> ${r.analisis}</p>`;
                if (r.por_que_no) {
                    html += `<ul>${r.por_que_no.map(x=>`<li>${x}</li>`).join('')}</ul>`;
                }
                if (r.enfoque_correcto) {
                    html += `<p class="fix"><i class="fas fa-lightbulb"></i> ${r.enfoque_correcto}</p>`;
                }
                fb.innerHTML = html;
            }
        });

        // Build main feedback panel
        buildFeedback(q, isCorrect);

        if (isCorrect) confetti({ particleCount: 80, spread: 60, origin: { y: 0.6 } });

        setTimeout(() => {
            document.getElementById('fb-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 200);
    }

    function buildFeedback(q, isCorrect) {
        const correct = q.opciones.find(o => o.es_correcta);
        const r = correct.retroalimentacion;
        const gen = q.retroalimentacion_general;
        const norms = q.referencias_normativas || [];

        const stepsHTML = r.secuencia_pasos ? `
            <div class="method-block">
                <h5><i class="fas fa-lightbulb"></i> Secuencia de Pasos</h5>
                <ol>${r.secuencia_pasos.map(s=>`<li>${s}</li>`).join('')}</ol>
            </div>` : '';

        const techHTML = r.razones_tecnicas ? `
            <div class="fb-box">
                <h5><i class="fas fa-microchip"></i> Razones Técnicas</h5>
                <ul>${r.razones_tecnicas.map(x=>`<li>${x}</li>`).join('')}</ul>
            </div>` : '';

        const pedHTML = r.razones_pedagogicas ? `
            <div class="fb-box">
                <h5><i class="fas fa-brain"></i> Razones Pedagógicas</h5>
                <ul>${r.razones_pedagogicas.map(x=>`<li>${x}</li>`).join('')}</ul>
            </div>` : '';

        const normHTML = norms.length ? `
            <div class="fb-box" style="grid-column: 1 / -1;">
                <h5><i class="fas fa-file-contract"></i> Referencias Normativas</h5>
                ${norms.map(n => `
                    <div class="norm-item">
                        <strong>${n.nombre}</strong>
                        <p>${n.descripcion} — <em>${n.aplicacion}</em></p>
                    </div>`).join('')}
            </div>` : '';

        const clavesHTML = gen && gen.claves ? `
            <div class="fb-box" style="grid-column: 1 / -1;">
                <h5><i class="fas fa-key"></i> Claves para el Concurso</h5>
                <div class="claves-list">
                    ${gen.claves.map(c=>`<div class="clave-item"><i class="fas fa-chevron-right"></i><span>${c}</span></div>`).join('')}
                </div>
                ${r.conclusion ? `<div class="conclusion">${r.conclusion}</div>` : ''}
            </div>` : '';

        const isLast = cur === questions.length - 1;
        const panel = document.getElementById('fb-panel');
        panel.innerHTML = `
            <div class="fb-banner ${isCorrect ? 'ok' : 'err'}">
                <i class="fas fa-${isCorrect ? 'check-circle' : 'times-circle'}"></i>
                ${isCorrect ? '¡ACIERTO! +1 Punto — Excelente práctica docente.' : 'Respuesta incorrecta — Analiza la retroalimentación para aprender.'}
            </div>
            ${stepsHTML}
            <div class="fb-grid" style="margin-top:1.2rem;">
                ${techHTML}${pedHTML}${normHTML}${clavesHTML}
            </div>
            <button class="btn-next" onclick="${isLast ? 'showFinal()' : 'next()'}">
                ${isLast ? '<i class="fas fa-trophy"></i> Ver Resultados Finales' : 'Siguiente Pregunta <i class="fas fa-arrow-right"></i>'}
            </button>`;
        panel.style.display = 'block';
    }

    function next() {
        cur++;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showFinal() {
        document.getElementById('progress-fill').style.width = '100%';
        const pct = Math.round(score / questions.length * 100);
        const msg = pct === 100 ? '¡Perfecto! Dominio total del módulo.' :
                    pct >= 70  ? 'Buen desempeño. Refuerza los temas que fallaste.' :
                                 'Sigue practicando. La constancia es la clave del concurso.';
        document.getElementById('question-zone').innerHTML = `
            <div class="final-card">
                <i class="fas fa-trophy fa-3x" style="color:var(--amber);"></i>
                <h2>Entrenamiento Completado</h2>
                <div class="score-big">${score}/${questions.length}</div>
                <p class="result-msg">${pct}% de aciertos — ${msg}</p>
                <button class="btn-restart" onclick="location.reload()">
                    <i class="fas fa-redo"></i> Reiniciar Entrenamiento
                </button>
                <p style="margin-top:1.2rem;"><a href="index.html" style="color:var(--purple-light);">Volver al inicio</a></p>
            </div>`;
        document.getElementById('fb-panel').style.display = 'none';
        confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 } });
    }

    init();
    </script>
</body>
</html>
