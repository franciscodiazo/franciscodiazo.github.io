name: Lighthouse CI

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v9
        with:
          urls: |
            https://franciscodiazo.github.io/
            https://franciscodiazo.github.io/11-3/
          uploadArtifacts: true
          config: '{"assertions": {"categories:performance": ["error", {"minScore":0.6}]}}'

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/reports/
