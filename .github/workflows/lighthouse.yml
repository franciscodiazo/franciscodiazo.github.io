name: Lighthouse CI

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v9
        with:
          urls: |
            https://franciscodiazo.github.io/
            https://franciscodiazo.github.io/11-3/
          uploadArtifacts: true
          # Stricter thresholds: aim for 90%+ in core categories. Adjust if tests fail on first runs.
          config: '{"assertions": {"categories:performance": ["error", {"minScore":0.9}], "categories:accessibility": ["error", {"minScore":0.9}], "categories:best-practices": ["error", {"minScore":0.9}], "categories:seo": ["error", {"minScore":0.9}]}}'

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/reports/
