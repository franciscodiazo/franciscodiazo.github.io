name: Sync student points

on:
  workflow_dispatch:
    inputs:
      points:
        description: 'JSON object mapping student id to points. Example: {"A001": 120, "A002": 50}'
        required: true
        type: string

permissions:
  contents: write

jobs:
  write-points:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse and write points file
        uses: actions/github-script@v7
        with:
          script: |
            const pointsText = core.getInput('points');
            let pointsData;
            try {
              pointsData = JSON.parse(pointsText);
            } catch (e) {
              core.setFailed('Invalid JSON for points input: ' + e.message);
            }
            const path = '11-3/data/points.json';
            const content = Buffer.from(JSON.stringify(pointsData, null, 2)).toString('base64');
            const message = 'Sync student points via workflow';
            const { data: existing } = await github.rest.repos.getContent({ owner: context.repo.owner, repo: context.repo.repo, path }).catch(()=>({}));
            if (existing && existing.sha) {
              await github.rest.repos.createOrUpdateFileContents({ owner: context.repo.owner, repo: context.repo.repo, path, message, content, sha: existing.sha });
            } else {
              await github.rest.repos.createOrUpdateFileContents({ owner: context.repo.owner, repo: context.repo.repo, path, message, content });
            }
