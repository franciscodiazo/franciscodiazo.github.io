<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Espacio Estudiante</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/11-3/css/11-3.css">
  <link rel="stylesheet" href="/assets/css/theme.css">
  <link rel="stylesheet" href="/assets/css/francisco.css">
</head>
<body>
  <a class="skip-link visually-hidden-focusable" href="#main-content">Saltar al contenido</a>
  <nav class="navbar navbar-expand-lg site-navbar">
    <div class="container">
      <a class="navbar-brand" href="/"><i class="bi bi-mortarboard-fill me-2" aria-hidden="true"></i>Francisco Díaz</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Alternar navegación">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="/" target="_self">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="/11-3/" target="_self">11-3 (Página)</a></li>
          <li class="nav-item"><a class="nav-link" href="/11-3/students.html" target="_self">Estudiantes</a></li>
          <li class="nav-item"><a class="nav-link" href="/11-3/rubricas.html" target="_self">Rúbricas</a></li>
          <li class="nav-item"><a class="nav-link" href="/11-3/simuladores.html" target="_self">Simuladores</a></li>
          <li class="nav-item"><a class="nav-link" href="/11-3/resources/" target="_self">Recursos</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main id="main-content" role="main" class="container">
    <div id="student-area">Cargando...</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function qs(name){
      return new URLSearchParams(location.search).get(name);
    }
    const id = qs('id');
    if(!id){ document.getElementById('student-area').innerHTML='<div class="alert alert-warning">No se indicó estudiante</div>' }
    else{
      Promise.all([fetch('/11-3/data/students.json').then(r=>r.json()), fetch('/11-3/data/activities.json').then(r=>r.json())]).then(([students, activities])=>{
        const s = students.find(x=>x.id==id);
        if(!s) return document.getElementById('student-area').innerHTML='<div class="alert alert-danger">Estudiante no encontrado</div>';
        const area=document.getElementById('student-area');
        area.innerHTML = `
          <div class="row g-3">
            <div class="col-md-8">
              <div class="card card-custom p-3">
                <h4>${s.name}</h4>
                <p>ID: ${s.id}</p>
                <p>Puntos: <strong>${s.points}</strong></p>
                <h6>Progreso del año</h6>
                <div class="progress mb-2"><div class="progress-bar" style="width:${s.progress}%">${s.progress}%</div></div>
                <h6>Actividades asignadas</h6>
                <ul>${activities.filter(a=>a.assigned.includes(s.id)).slice(0,5).map(a=>`<li>${a.title} — entrega <strong>${a.due}</strong></li>`).join('')}</ul>
              </div>
            </div>
            <div class="col-md-4">
              <div class="card card-custom p-3">
                <h6>Metas</h6>
                <ul>
                  <li>Meta ICFES: <strong>${s.goals.icfes || '---'}</strong></li>
                  <li>Meta SENA: <strong>${s.goals.sena || '---'}</strong></li>
                </ul>
                <a class="btn btn-primary-custom mt-3" href="#">Ganar puntos</a>
              </div>
            </div>
          </div>
        `
      })
    }
  </script>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-6">
          <p class="mb-0 font-weight-bold">Espacio 11-3 · Francisco Díaz</p>
          <small class="text-muted">Gestión educativa y recursos</small>
        </div>
        <div class="col-md-6 text-md-end">
          <ul class="list-inline mb-0">
            <li class="list-inline-item"><a href="#" class="text-muted"><i class="fab fa-twitter"></i></a></li>
            <li class="list-inline-item"><a href="#" class="text-muted"><i class="fab fa-github"></i></a></li>
            <li class="list-inline-item"><a href="#" class="text-muted"><i class="fab fa-dribbble"></i></a></li>
            <li class="list-inline-item"><a href="#" class="text-muted"><i class="fas fa-envelope"></i></a></li>
          </ul>
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
