<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Estudiantes 11-3</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/11-3/css/11-3.css">
  <link rel="stylesheet" href="/assets/css/theme.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg site-navbar">
    <div class="container">
      <a class="navbar-brand" href="/">Francisco Díaz</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
          <li class="nav-item"><a class="nav-link active" href="/11-3/">11-3</a></li>
          <li class="nav-item"><a class="nav-link" href="/11-3/students.html">Estudiantes</a></li>
          <li class="nav-item"><a class="nav-link" href="/11-3/rubricas.html">Rúbricas</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container">
    <h1 class="h4 mb-3">Estudiantes - 11-3</h1>
    <div id="students-list" class="row g-3"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch('/11-3/data/students.json').then(r=>r.json()).then(students=>{
      const container=document.getElementById('students-list');
      students.forEach(s=>{
        const col=document.createElement('div');col.className='col-md-4';
        col.innerHTML=`<div class="card card-custom p-3"><h5>${s.name}</h5><p class="mb-1">${s.id}</p><p class="mb-2">Puntos: <strong>${s.points}</strong></p><a class="btn btn-outline-primary" href="/11-3/student.html?id=${s.id}">Ver espacio</a></div>`;
        container.appendChild(col);
      })
    })
  </script>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-6">
          <p class="mb-0 font-weight-bold">Espacio 11-3 · Francisco Díaz</p>
          <small class="text-muted">Gestión educativa y recursos</small>
        </div>
        <div class="col-md-6 text-md-end">
          <ul class="list-inline mb-0">
            <li class="list-inline-item"><a href="#" class="text-muted"><i class="fab fa-twitter"></i></a></li>
            <li class="list-inline-item"><a href="#" class="text-muted"><i class="fab fa-github"></i></a></li>
            <li class="list-inline-item"><a href="#" class="text-muted"><i class="fab fa-dribbble"></i></a></li>
            <li class="list-inline-item"><a href="#" class="text-muted"><i class="fas fa-envelope"></i></a></li>
          </ul>
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
