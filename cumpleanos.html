<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cumpleaños 11-3 — Francisco Díaz</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body{font-family:Inter, sans-serif;background:#f8fafc;padding-top:90px}
    .student-avatar{width:70px;height:70px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;background:linear-gradient(135deg,#667eea,#764ba2);font-weight:700}
    .resource-card{background:white;border-radius:14px;padding:18px;border:1px solid #e6eefb}
    .search-wrap{max-width:720px;margin:0 auto}
  </style>
</head>
<body>
  <!-- Simple navbar (keeps look) -->
  <nav class="navbar navbar-expand-lg fixed-top" style="background:rgba(255,255,255,0.95);box-shadow:0 2px 20px rgba(0,0,0,0.06)">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">Francisco Díaz</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="/11-3/">11-3</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="py-5">
    <div class="container">
      <div class="text-center mb-4">
        <h1 class="fw-bold">🎂 Cumpleaños 11-3</h1>
        <p class="text-muted">Un espacio moderno para celebrar a nuestros compañeros. Busca por apellido o nombre.</p>
      </div>

      <div class="row mb-4 justify-content-center">
        <div class="col-md-6 search-wrap">
          <input id="birthday-search" class="form-control form-control-lg rounded-pill shadow-sm" type="search" placeholder="Buscar por apellidos o nombres...">
        </div>
      </div>

      <div class="row g-3" id="birthday-grid">
        <!-- Cards -->
      </div>
    </div>
  </main>

  <footer class="bg-dark text-white py-4">
    <div class="container text-center small opacity-75">&copy; 2026 Francisco Díaz</div>
  </footer>

  <script>
    const birthdays = [
      { last: "Arango Reina", name: "Emmanuel", date: "17 de Diciembre" },
      { last: "Benachi Gomez", name: "Lucia", date: "30 de Julio" },
      { last: "Betancur Beltran", name: "Natalia", date: "14 de Agosto" },
      { last: "Castillo Plaza", name: "Mariana", date: "26 de Febrero" },
      { last: "Ceron Lopez", name: "Danna Sofia", date: "28 de Julio" },
      { last: "Delgado Sanchez", name: "Linda Nicolle", date: "14 de Marzo" },
      { last: "Diaz Esguerra", name: "Mariana", date: "26 de Septiembre" },
      { last: "Diaz Murillo", name: "Maria Jose", date: "24 de Mayo" },
      { last: "Escudero Hernandez", name: "Ana Gabriela", date: "14 de Agosto" },
      { last: "Garcia Arcos", name: "Isabel Cristina", date: "25 de Febrero" },
      { last: "Gomez Nuñez", name: "Isabella", date: "5 de Septiembre" },
      { last: "Gutierrez Trujillo", name: "Valery", date: "24 de Abril" },
      { last: "Hernandez Alvarez", name: "Jessica Alejandra", date: "17 de Octubre" },
      { last: "Lerma Millan", name: "Derly Nathalia", date: "8 de Mayo" },
      { last: "Mejias Acosta", name: "Joneisi Deilibet", date: "29 de Noviembre" },
      { last: "Mendes Ramirez", name: "Juan Manuel", date: "11 de Marzo" },
      { last: "Mingan Bermudez", name: "Sara Lucia", date: "17 de Diciembre" },
      { last: "Orejuela Arce", name: "Daniel Esteban", date: "9 de Septiembre" },
      { last: "Perez Alarcon", name: "Oscarjulian", date: "29 de Septiembre" },
      { last: "Porras Hurtado", name: "Valentina", date: "4 de Febrero" },
      { last: "Quesada Delgado", name: "Madeline Sofia", date: "19 de Diciembre" },
      { last: "Rodriguez Medina", name: "Laura Sofia", date: "8 de Mayo" },
      { last: "Rojas Moya", name: "Oscar David", date: "29 de Diciembre" },
      { last: "Roldan Jimenez", name: "Cristian", date: "10 de Junio" },
      { last: "Saavedra Castañeda", name: "Samuel", date: "15 de Febrero" },
      { last: "Salazar Reina", name: "Luis David", date: "29 de Diciembre" },
      { last: "Sanchez Delgado", name: "Mariana", date: "11 de Enero" },
      { last: "Vazquez Madera", name: "Kristy Paulina", date: "26 de Septiembre" },
      { last: "Velazco Chivata", name: "Laura Valentina", date: "18 de Junio" },
      { last: "Velez Vazquez", name: "Ana Sofia", date: "21 de Mayo" },
      { last: "Volveras Garces", name: "Luis Esteban", date: "23 de Abril" }
    ];

    function generateBirthdayGrid(filter = '') {
      const container = document.getElementById('birthday-grid');
      container.innerHTML = '';
      const q = filter.trim().toLowerCase();

      birthdays.forEach(b => {
        const text = (b.last + ' ' + b.name).toLowerCase();
        if (q && !text.includes(q)) return;

        const initials = b.name.split(' ').map(n => n[0]).join('') + b.last.split(' ')[0][0];
        const col = document.createElement('div');
        col.className = 'col-md-3 col-6';
        col.innerHTML = `
          <div class="resource-card text-center shadow-sm">
            <div class="student-avatar mb-3">${initials}</div>
            <h6 class="fw-bold mb-1">${b.name}</h6>
            <small class="text-muted d-block mb-2">${b.last}</small>
            <div class="badge bg-primary">${b.date}</div>
          </div>
        `;
        container.appendChild(col);
      });
    }

    document.getElementById('birthday-search').addEventListener('input', e => generateBirthdayGrid(e.target.value));
    document.addEventListener('DOMContentLoaded', () => generateBirthdayGrid());
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/francisco.js"></script>
</body>
</html>
